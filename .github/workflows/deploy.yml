name: 🔄 Deploy

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set project name
        run: |
          CMS_CUSTOM="${{ secrets.CMS_PROJECT_NAME }}"
          if [ -n "$CMS_CUSTOM" ]; then
            RAW="$CMS_CUSTOM"
          else
            # owner首词（按 - _ 分割）+ 完整repo名 + branch首词（按 / 分割）
            OWNER_WORD=$(echo "${{ github.event.repository.owner.login }}" | tr '[:upper:]' '[:lower:]' | sed 's/[-_].*//')
            REPO_CLEAN=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g; s/-\+/-/g; s/^-//; s/-$//')
            BRANCH_WORD=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/\/.*//' | sed 's/[^a-z0-9-]/-/g; s/-\+/-/g; s/^-//; s/-$//')
            RAW="${OWNER_WORD}-${REPO_CLEAN}-${BRANCH_WORD}"
          fi
          PROJECT="${RAW//[^a-z0-9-]/-}"
          PROJECT=$(echo "$PROJECT" | sed 's/-\+/-/g; s/^-//; s/-$//')
          PROJECT=$(echo "${PROJECT:0:63}" | sed 's/-$//')
          echo "PROJECT_NAME=$PROJECT" >> $GITHUB_ENV
          echo "DB_NAME=$PROJECT-db" >> $GITHUB_ENV
          echo "BUCKET_NAME=$PROJECT-media" >> $GITHUB_ENV
          echo "→ Project name: $PROJECT"

      - name: Get D1 database ID
        run: |
          DB_LIST=$(npx wrangler d1 list --json)
          DB_ID=$(echo "$DB_LIST" | jq -r --arg name "$DB_NAME" '.[] | select(.name==$name) | .uuid')
          if [ -z "$DB_ID" ]; then
            echo "❌ Database $DB_NAME not found. Please run the Setup workflow first."
            exit 1
          fi
          echo "DB_ID=$DB_ID" >> $GITHUB_ENV

      - name: Patch wrangler.toml
        run: |
          sed -i "s/YOUR_D1_DATABASE_ID/$DB_ID/" wrangler.toml
          sed -i "s/database_name = \"cms-db\"/database_name = \"$DB_NAME\"/" wrangler.toml
          sed -i "s/bucket_name = \"cms-media\"/bucket_name = \"$BUCKET_NAME\"/" wrangler.toml
          sed -i "s|http://localhost:3000|https://$PROJECT_NAME.pages.dev|" wrangler.toml

      - name: Run new migrations
        run: |
          # Repair: mark migrations that were applied but not recorded (schema-based detection)
          npx wrangler d1 execute "$DB_NAME" --remote --command \
            "INSERT OR IGNORE INTO migrations(version,name) SELECT 4,'0004_clean_schema' WHERE (SELECT COUNT(*) FROM pragma_table_info('contents') WHERE name='category_id')=0" \
            2>/dev/null || true
          npx wrangler d1 execute "$DB_NAME" --remote --command \
            "INSERT OR IGNORE INTO migrations(version,name) SELECT 7,'0007_categories_sort_order' WHERE (SELECT COUNT(*) FROM pragma_table_info('categories') WHERE name='sort_order')>0" \
            2>/dev/null || true

          # Repair migration 9: re-encode storage settings that were stored as plain strings instead of JSON
          npx wrangler d1 execute "$DB_NAME" --remote --command \
            "UPDATE settings SET value='\"r2\"' WHERE key='storage.driver' AND value='r2'; UPDATE settings SET value='\"\"' WHERE key='storage.s3.endpoint' AND value=''; UPDATE settings SET value='\"\"' WHERE key='storage.s3.bucket' AND value=''; UPDATE settings SET value='\"auto\"' WHERE key='storage.s3.region' AND value='auto'; UPDATE settings SET value='\"\"' WHERE key='storage.s3.public_url' AND value=''" \
            2>/dev/null || true

          for f in $(ls migrations/*.sql | sort); do
            VERSION=$(basename "$f" | grep -o '^[0-9]*' | sed 's/^0*//')
            APPLIED=$(npx wrangler d1 execute "$DB_NAME" --remote \
              --command "SELECT COUNT(*) as c FROM migrations WHERE version = $VERSION" \
              --json 2>/dev/null | jq -r '.[0].results[0].c // 0' 2>/dev/null || echo "0")
            if [ "$APPLIED" = "0" ]; then
              echo "→ Applying migration: $(basename $f)"
              npx wrangler d1 execute "$DB_NAME" --remote --file="$f"
              # Auto-record in case migration file omits INSERT INTO migrations
              npx wrangler d1 execute "$DB_NAME" --remote --command \
                "INSERT OR IGNORE INTO migrations(version,name) VALUES($VERSION,'$(basename $f .sql)')" \
                2>/dev/null || true
            fi
          done

      - name: Build
        run: npm run build:pages
        env:
          NEXT_PUBLIC_SITE_URL: https://${{ env.PROJECT_NAME }}.pages.dev

      - name: Deploy
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s | LC_ALL=C tr -cd '[:print:]' | cut -c1-100)
          [ -z "$COMMIT_MSG" ] && COMMIT_MSG="Deploy $COMMIT_HASH"
          npx wrangler pages deploy dist \
            --project-name="$PROJECT_NAME" \
            --branch main \
            --commit-dirty=true \
            --commit-hash="$COMMIT_HASH" \
            --commit-message="$COMMIT_MSG"
